    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Fonts ── -->
    <!-- preconnect first so the TCP/TLS handshake is done before the CSS request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Non-blocking font load:
      - Only the weights actually used: Space Grotesk 600/700 (headings),
        Figtree 400/500/600 (body). Drops 8 fetches to 5.
      - media="print" loads async without blocking rendering.
        onload switches it to media="all" once the CSS arrives.
      - <noscript> fallback for environments without JS.
      - display=swap in the URL means text shows immediately in system font,
        swaps to web font when ready — zero render blocking.
    -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Figtree:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Figtree:wght@400;500;600&display=swap" media="print" onload="this.onload=null;this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Figtree:wght@400;500;600&display=swap" /></noscript>

    <!-- Apply saved theme before first paint to prevent flash of wrong theme -->
    <script>try{var t=localStorage.getItem("cvarvio.theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.classList.add("dark")}}catch(e){}</script>
    <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
